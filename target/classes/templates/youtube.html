<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">

<head>
    <meta charset="utf-8">
    <meta name="description" content="BioClub">
    <meta name="keywords" content="biology, bio, level 2">
    <meta name="author" content="Hy Vo">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BioClub</title>
    <link rel="icon" th:href="@{/img/favicon.ico}" href="/img/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <link th:href="@{/css/style.css}" href="/css/style.css" rel="stylesheet" type="text/css">
</head>

<body>
    <div class="text-bg-dark collapse" id="navbarHeader">
        <div class="container">
            <div class="row">
                <div class="col-sm-8 col-md-7 py-4">
                    <h4>About</h4>
                    <p class="text-white">Was a small web development project for year 12 back at KVC.</p>
                </div>
                <div class="col-sm-4 offset-md-1 py-4">
                    <h4>Contact</h4>
                    <ul class="list-unstyled">
                        <li><a href="https://x.com/hyvo01" class="text-white">Follow on X</a></li>
                        <!-- <li><a href="#" class="text-white">Like on Facebook</a></li> -->
                        <li><a href="mailto:vogiahy@gmail.com" class="text-white">Email me</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <nav class="navbar navbar-expand-sm navbar-dark bg-dark" th:fragment="navbar">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" th:href="@{/}" href="/">
                <img th:src="@{/img/favicon-32x32.png}" src="/img/favicon-32x32.png" alt="BioClub logo" width="32"
                    height="32" class="me-2">
                BioClub
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <!-- Unit Standards removed -->
                    <li class="nav-item"><a class="nav-link" th:href="@{/games.html}" href="/games.html">Games</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/youtube.html}" href="/youtube.html">YouTube</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="#" data-bs-toggle="collapse"
                            data-bs-target="#navbarHeader" aria-expanded="false">About</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="box1">
        <h1>Additional Video Resources</h1>
    </div>
    <div class="container my-4">
        <h2>Playlist</h2>
        <div id="videoCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner" id="carouselInner">
                <!-- thumbnails inserted by JS -->
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#videoCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#videoCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>

        <p class="mt-3">Click a thumbnail to open the player (lazy-loaded).</p>

        <!-- Modal player -->
        <div class="modal fade" id="videoModal" tabindex="-1" aria-labelledby="videoModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-xl modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="videoModalLabel">Video</h5>
                        <button type="button" class="btn btn-sm btn-outline-secondary me-2" id="ccToggle">CC</button>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body d-flex flex-column align-items-center">
                        <div id="playerContainer" style="width:100%;max-width:960px;aspect-ratio:16/9;background:#000">
                        </div>
                        <div class="mt-3 w-100" id="relatedList" aria-live="polite">
                            <!-- related suggestions inserted here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script th:src="@{/js/script.js}" src="/js/script.js"></script>
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
