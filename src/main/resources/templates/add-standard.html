<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Standard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <h2>Add New Standard</h2>
    <form th:action="@{/standards/add}" th:object="${standard}" method="post" class="mt-3">
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" class="form-control" th:field="*{title}" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">PDF Path (optional)</label>
            <input type="text" class="form-control" th:field="*{pdfPath}" placeholder="/pdfs/filename.pdf" />
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Add</button>
            <a th:href="@{/}" href="/" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
