<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">

<head th:replace="~{fragments/head :: head}"></head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div id="box1">
        <h1>Additional Video Resources</h1>
    </div>
    <div class="container my-4">
        <h2>Playlist</h2>
        <div id="videoCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-indicators">
                <button type="button" th:each="v,stat : ${youtubeList}"
                    data-bs-target="#videoCarousel"
                    th:attr="data-bs-slide-to=${stat.index}, aria-label=${'Slide ' + (stat.index + 1)}, aria-current=${stat.index == 0} ? 'true' : null"
                    th:classappend="${stat.index == 0} ? ' active' : ''"></button>
            </div>

            <div class="carousel-inner">
                <div th:each="v,stat : ${youtubeList}" class="carousel-item" th:classappend="${stat.index == 0} ? ' active' : ''">
                    <div class="d-flex justify-content-center">
                        <div class="card" style="max-width:900px; width:100%;">
                            <div class="card-body">
                                <h3 class="card-title" th:text="${v.title}">Video Title</h3>
                                <p class="card-text" th:text="${v.description}">Description</p>
                                <a th:href="${v.url}" target="_blank" rel="noopener" class="btn btn-primary" th:text="${v.buttonLabel ?: 'Watch'}">Watch</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#videoCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#videoCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>

        </div>
        <p class="mt-3">Click the card button to open the video (opens in a new tab).</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script th:src="@{/js/script.js}" src="/js/script.js"></script>
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
