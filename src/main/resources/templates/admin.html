<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 d-none d-md-block bg-light sidebar">
      <div class="position-sticky pt-3">
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link active" href="#home">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#games">Games</a></li>
          <li class="nav-item"><a class="nav-link" href="#youtube">YouTube</a></li>
        </ul>
      </div>
    </nav>

    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
      <h1 class="h2 mt-3">Admin Dashboard</h1>

      <section id="home" class="my-4">
        <h3>Home - Site Text</h3>
        <div class="card mb-3">
          <div class="card-body">
            <form th:action="@{/admin/setNavTitle}" method="post" class="mb-3">
              <div class="mb-2">
                <label class="form-label">Navigation Title</label>
                <input name="navTitle" class="form-control" th:value="${navTitle}" />
              </div>
              <button class="btn btn-primary btn-sm">Save</button>
              <button formaction="/admin/resetNavTitle" formmethod="post" class="btn btn-outline-secondary btn-sm">Reset</button>
            </form>

            <form th:action="@{/admin/setIndexHeading}" method="post" class="mb-3">
              <div class="mb-2">
                <label class="form-label">Index H1 (HTML allowed)</label>
                <textarea name="indexHeading" class="form-control" rows="3" th:text="${indexHeading}"></textarea>
              </div>
              <button class="btn btn-primary btn-sm">Save</button>
              <button formaction="/admin/resetIndexHeading" formmethod="post" class="btn btn-outline-secondary btn-sm">Reset</button>
            </form>

            <form th:action="@{/admin/setIndexParagraph}" method="post">
              <div class="mb-2">
                <label class="form-label">Index Paragraph</label>
                <input name="indexParagraph" class="form-control" th:value="${indexParagraph}" />
              </div>
              <button class="btn btn-primary btn-sm">Save</button>
              <button formaction="/admin/resetIndexParagraph" formmethod="post" class="btn btn-outline-secondary btn-sm">Reset</button>
            </form>
          </div>
        </div>
      </section>

      <section id="games" class="my-4">
        <h3>Games</h3>
        <div class="card mb-3">
          <div class="card-body">
            <h5 class="mb-3">Add New Game</h5>
            <form th:action="@{/admin/games/add}" method="post" class="row g-2 mb-3">
              <div class="col-md-4"><input name="title" class="form-control" placeholder="Title" required></div>
              <div class="col-md-5"><input name="description" class="form-control" placeholder="Description"></div>
              <div class="col-md-3"><input name="url" class="form-control" placeholder="https://..." required></div>
              <div class="col-12 mt-2">
                <button class="btn btn-primary btn-sm">Add Game</button>
              </div>
            </form>

            <h5 class="mb-2">Existing Games</h5>
            <div th:if="${#lists.isEmpty(games)}"><p class="text-muted">No games configured.</p></div>
            <div th:each="g,stat : ${games}" class="mb-2">
              <form th:action="@{/admin/games/edit/{idx}(idx=${stat.index})}" method="post" class="row g-2 align-items-center">
                <div class="col-md-3"><input name="title" class="form-control" th:value="${g.title}" required></div>
                <div class="col-md-5"><input name="description" class="form-control" th:value="${g.description}"></div>
                <div class="col-md-3"><input name="url" class="form-control" th:value="${g.url}" required></div>
                <div class="col-md-1 d-flex gap-1">
                  <button class="btn btn-warning btn-sm">Save</button>
                  <button th:formaction="@{/admin/games/delete/{idx}(idx=${stat.index})}" formmethod="post" class="btn btn-danger btn-sm">Delete</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </section>

      <section id="youtube" class="my-4">
        <h3>YouTube</h3>
        <div class="card mb-3">
          <div class="card-body">
            <h5 class="mb-3">Add New Video</h5>
            <form th:action="@{/admin/youtube/add}" method="post" class="row g-2 mb-3">
              <div class="col-md-4"><input name="title" class="form-control" placeholder="Title" required></div>
              <div class="col-md-5"><input name="description" class="form-control" placeholder="Description"></div>
              <div class="col-md-3"><input name="url" class="form-control" placeholder="https://..." required></div>
              <div class="col-12 mt-2">
                <button class="btn btn-primary btn-sm">Add Video</button>
              </div>
            </form>

            <h5 class="mb-2">Existing Videos</h5>
            <div th:if="${#lists.isEmpty(youtubeList)}"><p class="text-muted">No videos configured.</p></div>
            <div th:each="v,stat : ${youtubeList}" class="mb-2">
              <form th:action="@{/admin/youtube/edit/{idx}(idx=${stat.index})}" method="post" class="row g-2 align-items-center">
                <div class="col-md-3"><input name="title" class="form-control" th:value="${v.title}" required></div>
                <div class="col-md-5"><input name="description" class="form-control" th:value="${v.description}"></div>
                <div class="col-md-3"><input name="url" class="form-control" th:value="${v.url}" required></div>
                <div class="col-md-1 d-flex gap-1">
                  <button class="btn btn-warning btn-sm">Save</button>
                  <button th:formaction="@{/admin/youtube/delete/{idx}(idx=${stat.index})}" formmethod="post" class="btn btn-danger btn-sm">Delete</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
