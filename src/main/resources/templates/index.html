<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">

<head th:replace="~{fragments/head :: head}"></head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <section class="position-relative overflow-hidden"
        th:style="'min-height:60vh; background: url(' + @{/img/plants.jpg} + ') center center / cover no-repeat;'">
        <div class="position-absolute top-0 start-0 w-100 h-100" style="background: rgba(0, 0, 0, 0.35);"></div>

        <div class="container position-relative z-1">
            <div class="row align-items-center" style="min-height:60vh;">
                <div class="col-md-8 col-lg-5 text-white text-start fade-in-up">
                    <h1 class="fw-semibold lh-1 mb-4" style="font-size: clamp(3rem, 7vw, 4rem);" th:utext="${indexHeading}">
                        <!-- Heading rendered via admin: indexHeading -->
                    </h1>

                    <p class="fs-4 mb-4" style="max-width: 760px;" th:text="${indexParagraph}">
                        <!-- Paragraph rendered via admin: indexParagraph -->
                    </p>


                </div>

                <div class="col-md-4 col-lg-7 d-none d-md-flex justify-content-end fade-in-up">
                    <div class="mt-4">
                        <div class="row g-4">

                            <div class="card shadow-sm" id="shufflerCard">
                                <div class="card-header">Study Card</div>
                                <div class="card-body d-flex flex-column align-items-center">
                                    <div id="cardDisplay" class="w-100">
                                        <div class="card text-center">
                                            <div class="card-body">
                                                <h5 id="cardTitle" class="card-title">Final Exam Study Questions</h5>
                                                <p id="cardContent" class="card-text">200 Questions. Press shuffle to begin.
                                                </p>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="mt-3 d-flex gap-2">
                                        <button id="prevBtn" class="btn btn-secondary" disabled>Prev</button>
                                        <button id="nextBtn" class="btn btn-secondary" disabled>Next</button>
                                        <button id="shuffleBtn" class="btn btn-outline-secondary">Shuffle</button>
                                    </div>
                                    <div class="mt-2"><small id="progressText" class="text-muted"></small></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-5 d-flex align-items-center fade-in-up" style="min-height:30vh">
        <div class="container">
            <div class="d-flex justify-content-end mb-3">
                <a th:href="@{/standards/add}" href="/standards/add" class="btn btn-sm btn-primary me-2">Add Standard</a>
                <a th:href="@{/standards/deleteAll}" href="/standards/deleteAll" class="btn btn-sm btn-outline-danger"
                   onclick="return confirm('Delete all standards? This cannot be undone.');">Delete All</a>
            </div>
            <div class="row g-4">
                <div th:each="s,stat : ${standards}" class="col-12 col-sm-6 col-md-4 col-lg-2">
                    <div class="card h-100 text-center">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title" th:text="${s.title}">Standard Title</h5>
                            <p class="card-text small text-muted" th:text="${s.description}">Description</p>
                            <div class="mt-auto d-flex justify-content-center gap-2">
                                <a th:if="${s.pdfPath != null}" th:href="${s.pdfPath}" class="btn btn-sm btn-primary" download>Download PDF</a>
                                <a th:href="@{/standards/edit/{idx}(idx=${stat.index})}" class="btn btn-sm btn-warning">Edit</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script th:src="@{/js/script.js}" src="/js/script.js"></script>
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>

</html>
